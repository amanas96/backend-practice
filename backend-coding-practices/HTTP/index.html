    <button onclick="getUser()">GET</button>
    <button onclick="createUser()">POST</button>

    <button onclick="updateUser()">PATCH</button>
    <button onclick="deleteUser()">DELETE</button>
    <button onclick="Hi()">Get HTML</button>
    <button onclick="getJSON()">Get JSON</button>

    <div id="result"></div>

    <script>

      const API_URL = "http://localhost:5000/api/user";
      const API_URL_DATA = "http://localhost:5000/api/data";

      async function getUser() {
        const res = await fetch(API_URL);
        const data = await res.json();

        show(res, data);
      }
      async function createUser() {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            name: "Jane Doe",
            age: 25,
          }),
        });
        const data = await res.json();
        show(res, data);
      }
      async function updateUser() {
        const res = await fetch(API_URL, {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            age: 40,
          }),
        });
        const data = await res.json();
        show(res, data);
      }

      async function replaceUser() {
        const res = await fetch(API_URL, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            name: "Aman",
            age: 35,
          }),
        });
        const data = await res.json();
        show(res, data);
      }

      async function deleteUser() {
        const res = await fetch(API_URL, {
          method: "DELETE",
          headers: {
            "Content-Type": "application/json",
          },
        });
        show(res, { message: "User deleted" });
      }

      async function Hi() {
        const res = await fetch(API_URL_DATA, {
          cache: "no-cache",
          headers: {
            Accept: "text/html",
          },
        });
        const data = await res.text();
        show(res, data);
      }

      async function getJSON() {
        const res = await fetch(API_URL_DATA, {
          cache: "no-cache",
          headers: {
            Accept: "application/json",
          },
        });
        const data = await res.json();
        show(res, data);
      }

      function show(res, data) {
        const result = document.getElementById("result");
        if (typeof data === "string") {
          result.innerHTML = `Status:${res.status}` + data;
        } else {
          result.innerText =
            `Status: ${res.status}\n\n` + JSON.stringify(data, null, 2);
        }
      }
    </script>
